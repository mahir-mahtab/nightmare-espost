services:
  postgres:
    image: postgres:16-alpine
    container_name: esports_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: esports_user
      POSTGRES_PASSWORD: esports_pass
      POSTGRES_DB: esports_events
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esports_user -d esports_events"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: esports_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
